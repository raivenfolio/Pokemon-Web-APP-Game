<!DOCTYPE html>
<html lang="en">
<head>
  <title>Pokémon Capture Game</title>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      padding: 0;
      min-height: 100vh;
      background-image: url('gameBG.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
      font-family: Arial, sans-serif;
      text-align: center;
      color: #fff;
    }

    /* START SCREEN */
    #startScreen {
      width: 100%;
      height: 100vh;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      background-image: url('bg.png');
      background-size: cover;
      background-position: center;
      background-repeat: no-repeat;
      background-attachment: fixed;
    }

    #startScreen a {
      display: block;
      margin-top: 20px;
      text-decoration: none;
    }

    .float-img {
      width: 1200px;
      animation: floatPulse 4s ease-in-out infinite;
      cursor: pointer;
    }

    @keyframes floatPulse {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.07); }
    }

    /* GAME SCREEN – moved lower */
    #gameScreen {
      display: none;
      min-height: 100vh;
      padding: 200px 20px 40px;   /* content a bit lower */
    }

    #gameContent {
      max-width: 600px;
      margin: 0 auto;
    }

    /* Silhouette – no extra box */
    #pokemon {
      width: 170px;
      margin: 0 auto 16px;
      display: block;
      filter: brightness(0);
      -webkit-filter: brightness(0);
      border: none;
      outline: none;
      box-shadow: none;
      background: none;
    }

    #pokemon.reveal {
      filter: brightness(1);
      -webkit-filter: brightness(1);
      border: none;
      outline: none;
      box-shadow: none;
      background: none;
    }

    /* Line of letters */
    #word {
      font-size: 22px;
      letter-spacing: 5px;
      margin: 10px 0 14px;
    }

    /* Hearts */
    #health {
      font-size: 24px;
      margin: 10px 0 14px;
      color: #f00;
    }

    /* Input row */
    .input-row {
      display: flex;
      justify-content: center;
      gap: 10px;
      margin-top: 10px;
    }

    .input-row input {
      width: 120px;
      padding: 6px 8px;
      border-radius: 4px;
      border: 1px solid #ccc;
    }

    .input-row button {
      padding: 6px 12px;
      border-radius: 4px;
      border: none;
      background: #007cba;
      color: white;
    }

    /* Messages */
    #result {
      margin: 16px 0 0;
    }

    #wrong-letters {
      font-size: 16px;
    }

    /* Captured Pokémon */
    #collection {
      margin-top: 18px;
    }

    #collection img {
      width: 40px;
      margin: 3px;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>

<body>

<div id="startScreen">
  <a href="#" onclick="startGame(); return false;">
    <img src="button.png" class="float-img">
  </a>
</div>

<div id="gameScreen">
  <div id="gameContent">

    <img id="pokemon" src="" alt="Silhouette">

    <p id="word"></p>
    <p id="health"></p>

    <div class="input-row">
      <input type="text" id="letter" maxlength="1"
        placeholder="Guess a letter"
        onkeypress="if(event.key === 'Enter') guessLetter()">
      <button onclick="guessLetter()">Guess</button>
    </div>

    <p id="result"></p>

    <p>Wrong Guesses:
      <span id="wrong-letters">None</span>
    </p>

    <h3>Captured Pokémon</h3>
    <div id="collection"></div>
  </div>
</div>

<script>
let pokemons = [];
let current, displayWord, health;
let wrongLetters = [];

fetch("gen1.json")
  .then(res => res.json())
  .then(data => pokemons = data);

function startGame() {
  document.getElementById("startScreen").style.display = "none";
  document.getElementById("gameScreen").style.display = "block";
  newGame();
}

function newGame() {
  // 👇 Optional debug line (you can remove it later)
  console.log("src =", current?.img);

  current = pokemons[Math.floor(Math.random() * pokemons.length)];
  displayWord = "_".repeat(current.name.length).split("");
  health = 5;
  wrongLetters = [];

  const img = document.getElementById("pokemon");
  img.src = current.img;
  img.classList.remove("reveal");
  img.classList.add("silhouette");

  document.getElementById("word").textContent = displayWord.join(" ");
  document.getElementById("health").textContent = "❤".repeat(health);
  document.getElementById("result").textContent = "";
  document.getElementById("wrong-letters").textContent = "None";
}

function guessLetter() {
  const input = document.getElementById("letter");
  const letter = input.value.toLowerCase();
  if (!letter) return;

  let correct = false;

  for (let i = 0; i < current.name.length; i++) {
    if (current.name[i].toLowerCase() === letter) {
      displayWord[i] = current.name[i];
      correct = true;
    }
  }

  if (!correct) {
    health--;
    if (!wrongLetters.includes(letter)) {
      wrongLetters.push(letter);
    }
    document.getElementById("wrong-letters").textContent = wrongLetters.join(", ");
  }

  document.getElementById("word").textContent = displayWord.join(" ");
  document.getElementById("health").textContent = "❤".repeat(health);
  input.value = "";

  if (displayWord.join("") === current.name) {
    document.getElementById("result").textContent = "You captured " + current.name + "!";
    const img = document.getElementById("pokemon");
    img.classList.remove("silhouette");
    img.classList.add("reveal");
    document.getElementById("collection").innerHTML += `<img src="${current.img}">`;
    setTimeout(newGame, 1200);

  } else if (health <= 0) {
    document.getElementById("result").textContent = "You fainted! It was " + current.name;
    const img = document.getElementById("pokemon");
    img.classList.remove("silhouette");
    img.classList.add("reveal");
    setTimeout(newGame, 1200);
  }
}
</script>

</body>
</html>
